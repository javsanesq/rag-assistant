services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me-dev-token}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
      API_QUERY_RATE_LIMIT_PER_MINUTE: ${API_QUERY_RATE_LIMIT_PER_MINUTE:-30}
      API_URL_INGEST_RATE_LIMIT_PER_MINUTE: ${API_URL_INGEST_RATE_LIMIT_PER_MINUTE:-10}
      API_RATE_LIMIT_WINDOW_SECONDS: ${API_RATE_LIMIT_WINDOW_SECONDS:-60}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////workspace/data/app.db}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_assistant}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-384}
      RELEVANCE_MIN_LEXICAL_SCORE: ${RELEVANCE_MIN_LEXICAL_SCORE:-0.12}
      RELEVANCE_MIN_DENSE_SCORE: ${RELEVANCE_MIN_DENSE_SCORE:-0.40}
      RELEVANCE_MIN_FINAL_SCORE: ${RELEVANCE_MIN_FINAL_SCORE:-0.01}
      RELEVANCE_MIN_MEANINGFUL_TERMS: ${RELEVANCE_MIN_MEANINGFUL_TERMS:-2}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-mock}
      EMBED_MODEL: ${EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EVAL_DATASET_DIR: ${EVAL_DATASET_DIR:-/workspace/evals/datasets}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/workspace/data
      - ./evals:/workspace/evals:ro
      - ./samples:/workspace/samples:ro
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/ready >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: python -m rag_assistant_api.worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me-dev-token}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
      API_QUERY_RATE_LIMIT_PER_MINUTE: ${API_QUERY_RATE_LIMIT_PER_MINUTE:-30}
      API_URL_INGEST_RATE_LIMIT_PER_MINUTE: ${API_URL_INGEST_RATE_LIMIT_PER_MINUTE:-10}
      API_RATE_LIMIT_WINDOW_SECONDS: ${API_RATE_LIMIT_WINDOW_SECONDS:-60}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////workspace/data/app.db}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_assistant}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-384}
      RELEVANCE_MIN_LEXICAL_SCORE: ${RELEVANCE_MIN_LEXICAL_SCORE:-0.12}
      RELEVANCE_MIN_DENSE_SCORE: ${RELEVANCE_MIN_DENSE_SCORE:-0.40}
      RELEVANCE_MIN_FINAL_SCORE: ${RELEVANCE_MIN_FINAL_SCORE:-0.01}
      RELEVANCE_MIN_MEANINGFUL_TERMS: ${RELEVANCE_MIN_MEANINGFUL_TERMS:-2}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-mock}
      EMBED_MODEL: ${EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      EVAL_DATASET_DIR: ${EVAL_DATASET_DIR:-/workspace/evals/datasets}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-2}
    volumes:
      - ./data:/workspace/data
      - ./evals:/workspace/evals:ro
      - ./samples:/workspace/samples:ro
    depends_on:
      qdrant:
        condition: service_healthy
      api:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 20

  ui:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  qdrant_storage:
