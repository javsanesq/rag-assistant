name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API package
        run: |
          python -m pip install --upgrade pip
          pip install -e ./api[dev]
      - name: Run tests
        env:
          PYTHONPATH: api/src
        run: pytest
      - name: Validate frontend and deployment config
        run: |
          node --check ui/app.js
          bash -n scripts/smoke_docker.sh
          docker compose config >/tmp/rag-compose.yml
