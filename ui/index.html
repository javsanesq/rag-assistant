<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail">
        <div class="rail-header">
          <p class="eyebrow">RAG Assistant</p>
          <div class="status-strip">
            <span id="api-status">checking…</span>
          </div>
        </div>

        <section class="rail-section">
          <p class="section-kicker">Ingest</p>
          <form id="file-form" class="stack-form">
            <label class="field">
              <span>Upload files</span>
              <input id="file-input" name="files" type="file" multiple />
            </label>
            <label class="field">
              <span>Metadata JSON</span>
              <textarea id="metadata-json" rows="3" placeholder='{"category":"policy"}'></textarea>
            </label>
            <button type="submit">Queue files</button>
          </form>

          <div class="divider"></div>

          <form id="url-form" class="stack-form">
            <label class="field">
              <span>URL or sitemap</span>
              <input id="url-input" type="url" placeholder="https://example.com/docs" />
            </label>
            <label class="field">
              <span>Mode</span>
              <select id="url-mode">
                <option value="url">Single page</option>
                <option value="sitemap">Sitemap</option>
              </select>
            </label>
            <button type="submit">Queue URL</button>
          </form>
        </section>

        <section class="rail-section grow">
          <p class="section-kicker">Corpus</p>
          <div id="document-list" class="doc-list"></div>
        </section>
      </aside>

      <main class="chat-stage">
        <div id="chat-log" class="chat-log">
          <div class="empty-state" id="empty-hint">
            <p class="empty-title">Ask a grounded question</p>
            <p class="empty-sub">Answers will include source citations and retrieval scores.</p>
          </div>
        </div>

        <form id="query-form" class="query-bar">
          <div class="query-filters">
            <label class="field inline">
              <span>Category</span>
              <select id="category-filter">
                <option value="">All</option>
              </select>
            </label>
            <label class="field inline">
              <span>Doc IDs</span>
              <input id="document-filter" placeholder="id1,id2" />
            </label>
          </div>
          <div class="query-input-row">
            <textarea id="question-input" rows="1" placeholder="What is the refund window for annual plans?"></textarea>
            <button type="submit" class="send-btn" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
      </main>

      <aside class="inspector">
        <section class="rail-section">
          <p class="section-kicker">Jobs</p>
          <div id="job-list" class="timeline"></div>
        </section>

        <section class="rail-section">
          <p class="section-kicker">Evaluation</p>
          <form id="eval-form" class="stack-form">
            <label class="field">
              <span>Dataset</span>
              <input id="dataset-name" value="portfolio_eval.jsonl" />
            </label>
            <button type="submit">Run eval</button>
          </form>
          <div id="eval-list" class="timeline"></div>
        </section>
      </aside>
    </div>

    <script src="./app.js?v=20260530c" defer></script>
  </body>
</html>
